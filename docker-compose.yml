services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ottawa_waittimes
      POSTGRES_USER: ottawa
      POSTGRES_PASSWORD: ottawa
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ottawa -d ottawa_waittimes"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    restart: unless-stopped

  scraper:
    build:
      context: .
      dockerfile: Dockerfile.scraper
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # One-shot migration runner. Enable with: docker compose --profile tools run --rm migrate
  migrate:
    profiles: ["tools"]
    image: migrate/migrate:v4.18.1
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./migrations:/migrations
    command: ["-path", "/migrations", "-database", "postgres://ottawa:ottawa@postgres:5432/ottawa_waittimes?sslmode=disable", "up"]

volumes:
  postgres_data:
